<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok</title>
    <link rel="stylesheet" href="../output.css">
</head>
<body>
    <div class="min-h-screen bg-gradient-to-br from-indigo-950 via-purple-950 to-pink-950 flex items-center justify-center p-8">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-6xl">
    <!-- Card 1 -->
    <div class="group relative bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 shadow-2xl hover:shadow-purple-500/30 transition-all duration-500 animate-float">
            <div class="absolute inset-0 rounded-3xl bg-gradient-to-r from-purple-500/20 to-pink-500/20 opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                    <h3 class="text-3xl font-bold text-white mb-4">Creative</h3>
                        <p class="text-gray-300">Hover magic ✨</p>
                        </div>
                
            <!-- Card 2 (delayed) -->
            <div class="group relative bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 shadow-2xl hover:shadow-cyan-500/30 transition-all duration-500 animate-float [animation-delay:1s]">
                    <div class="absolute inset-0 rounded-3xl bg-gradient-to-r from-cyan-500/20 to-blue-500/20 opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                                <h3 class="text-3xl font-bold text-white mb-4">Modern</h3>
                                            <p class="text-gray-300">Glass effect</p>
                                        </div>
        
    <!-- Card 3 -->
                                <div  class="group relative bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 shadow-2xl hover:shadow-pink-500/30 transition-all duration-500 animate-float [animation-delay:2s]">
                            <div class="absolute inset-0 rounded-3xl bg-gradient-to-r from-pink-500/20 to-rose-500/20 opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                    <h3 class="text-3xl font-bold text-white mb-4">Beautiful</h3>
            <p class="text-gray-300">Pure Tailwind</p>
        </div>
    </div>
</div>
<div class="min-h-screen flex items-center justify-center bg-gray-950">
    <h1 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 animate-slide-bg bg-[length:200%_auto] tracking-tight">
        Future is Now
    </h1>
</div>
<div class="flex flex-wrap gap-8 p-12 justify-center bg-gray-950 min-h-screen items-center">
  <button class="relative px-10 py-5 rounded-full font-bold text-lg overflow-hidden group">
        <span class="relative z-10 text-white">GLOW</span>
                <span class="absolute inset-0 bg-gradient-to-r from-purple-600 to-pink-600 animate-glow opacity-70 group-hover:opacity-100 transition-opacity"></span>
                    <span class="absolute inset-0 bg-gradient-to-r from-purple-600 to-pink-600 blur-xl opacity-40 group-hover:opacity-70 transition-opacity"></span>
                        </button>

                            <button class="relative px-10 py-5 rounded-xl font-bold text-lg border-2 border-cyan-400 text-cyan-400 hover:text-white overflow-hidden group">
                    <span class="relative z-10">NEON BORDER</span>
                <span class="absolute inset-0 bg-cyan-500/20 animate-pulse"></span>
        <span class="absolute -inset-1 bg-gradient-to-r from-cyan-500 via-blue-500 to-purple-500 opacity-0 group-hover:opacity-70 blur-lg transition-all duration-500"></span>
  </button>
</div>
<div class="min-h-screen bg-black flex items-center justify-center">
    <div class="text-center">
            <div class="text-5xl md:text-7xl font-bold text-white overflow-hidden inline-block">
                <span class="animate-reveal inline-block whitespace-nowrap bg-gradient-to-r from-yellow-400 via-red-500 to-pink-500 bg-clip-text text-transparent">
                            Welcome to 2026
                            </span>
                                    </div>
                            <p class="mt-6 text-xl text-gray-400 animate-reveal [animation-delay:1.2s] opacity-0 [animation-fill-mode:forwards]">
                            Built with pure Tailwind magic
                    </p>
        </div>
</div>
</body>
</html>
